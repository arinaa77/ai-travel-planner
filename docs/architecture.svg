<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">

  <!-- Client -->
  <rect x="300" y="20" width="300" height="72" rx="12" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="450" y="52" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">Client (Next.js App Router)</text>
  <text x="450" y="74" text-anchor="middle" font-size="12.5" fill="#047857">React · Tailwind · Supabase SSR</text>

  <!-- Arrow down -->
  <line x1="450" y1="92" x2="450" y2="134" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- API Routes -->
  <rect x="150" y="134" width="600" height="72" rx="12" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="450" y="166" text-anchor="middle" font-size="16" font-weight="700" fill="#4c1d95">Next.js API Routes</text>
  <text x="450" y="188" text-anchor="middle" font-size="12.5" fill="#6d28d9">/api/generate · /api/judge · /api/trips · /api/auth</text>

  <!-- Arrows to services -->
  <line x1="270" y1="206" x2="195" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="206" x2="450" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="630" y1="206" x2="705" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Generate Service -->
  <rect x="60" y="278" width="270" height="72" rx="12" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="195" y="310" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">Generate Service</text>
  <text x="195" y="332" text-anchor="middle" font-size="12" fill="#b45309">tool_use → itinerary + breakdowns</text>

  <!-- Judge Service -->
  <rect x="315" y="278" width="270" height="72" rx="12" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="450" y="310" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">Judge Service</text>
  <text x="450" y="332" text-anchor="middle" font-size="12" fill="#b45309">tool_use → scores + verdict</text>

  <!-- Trips + Auth -->
  <rect x="570" y="278" width="270" height="72" rx="12" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="705" y="310" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">Trips + Auth</text>
  <text x="705" y="332" text-anchor="middle" font-size="12" fill="#b45309">CRUD · sign in · sign up · RLS</text>

  <!-- Arrows to data -->
  <line x1="195" y1="350" x2="290" y2="418" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="350" x2="390" y2="418" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="705" y1="350" x2="660" y2="418" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Claude API -->
  <rect x="160" y="418" width="300" height="72" rx="12" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="310" y="450" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">Claude API</text>
  <text x="310" y="472" text-anchor="middle" font-size="12" fill="#b91c1c">claude-sonnet-4-5 · tool_use · structured JSON</text>

  <!-- Supabase -->
  <rect x="490" y="418" width="260" height="72" rx="12" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="620" y="450" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">Supabase</text>
  <text x="620" y="472" text-anchor="middle" font-size="12" fill="#b91c1c">PostgreSQL · Auth · Row Level Security</text>

  <!-- Legend -->
  <rect x="60" y="508" width="14" height="14" rx="3" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="80" y="520" font-size="11.5" fill="#475569">Frontend</text>
  <rect x="155" y="508" width="14" height="14" rx="3" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="175" y="520" font-size="11.5" fill="#475569">API Layer</text>
  <rect x="255" y="508" width="14" height="14" rx="3" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="275" y="520" font-size="11.5" fill="#475569">Services</text>
  <rect x="345" y="508" width="14" height="14" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="365" y="520" font-size="11.5" fill="#475569">Data</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

</svg>
